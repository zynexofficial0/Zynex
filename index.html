<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zynex - Market Updates</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Zynex</h1>
    <p>Real-time Crypto, Forex & Stock Market Updates</p>
  </header>

  <main>
    <section id="crypto">
      <h2>Crypto Market</h2>
      <div class="market-data" id="crypto-data">Loading crypto prices...</div>
    </section>

    <section id="forex">
      <h2>Forex Market</h2>
      <div class="market-data" id="forex-data">Loading forex rates...</div>
    </section>

    <section id="stocks">
      <h2>Stock Market</h2>
      <div class="market-data" id="stock-data">Loading stock updates...</div>
    </section>
  </main>

  <footer>
    <p>© 2025 Zynex. Powered by free market APIs.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
